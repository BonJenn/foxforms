# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: foxforms
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: foxforms
service: foxforms

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-2
  environment:
    JWT_SECRET: require('crypto').randomBytes(64).toString('hex')
    MONGODB_URI: mongodb+srv://bonjennprojects:123@cluster0.hggbu5a.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0

functions:
  app:
    handler: index.handler  # or handler.handler if your main file is handler.js
    events:
      - http:
          path: /
          method: any
          integration: AWS_PROXY
          uri: https://23cvva9qi2.execute-api.us-east-2.amazonaws.com/dev/
      - http:
          path: /{proxy+}
          method: any
          integration: AWS_PROXY
          uri: https://23cvva9qi2.execute-api.us-east-2.amazonaws.com/dev/{proxy+}

package:
  exclude:
    - node_modules/**
    - .git/**
